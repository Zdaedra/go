version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sc_postgres
    environment:
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: crawler_password
      POSTGRES_DB: crawler_db
    volumes:
      - /data/storage/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U crawler -d crawler_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sc_redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  orchestrator:
    build:
      context: ./apps/orchestrator
      dockerfile: Dockerfile
    container_name: sc_orchestrator
    environment:
      - DATABASE_URL=postgresql+psycopg://crawler:crawler_password@postgres:5432/crawler_db
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8800:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /data/sites:/app/sites

  crawler_worker:
    build:
      context: ./apps/crawler-worker
      dockerfile: Dockerfile
    container_name: sc_crawler_worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ORCHESTRATOR_URL=http://orchestrator:8000
    depends_on:
      redis:
        condition: service_healthy
      orchestrator:
        condition: service_started
    volumes:
      - /data/sites:/app/sites

  go_worker:
    build:
      context: ./apps/go-worker
      dockerfile: Dockerfile
    container_name: sc_go_worker
    environment:
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: sc_dashboard
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8800
    ports:
      - "3300:3000"
    depends_on:
      - orchestrator
