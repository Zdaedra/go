name: go-lesson-mvp

services:
  caddy:
    image: caddy:2.8-alpine
    container_name: go_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend
      - minio

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://${DOMAIN}
    container_name: go_frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://${DOMAIN}
    depends_on:
      - api

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: go_api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - S3_BUCKET=${S3_BUCKET}
      - S3_PUBLIC_ENDPOINT=http://${DOMAIN}:9002
      - PUBLIC_ASSETS_BASE_URL=http://${DOMAIN}/assets
      - NEXT_PUBLIC_API_BASE_URL=http://${DOMAIN}/api
      - SECRET_KEY=${SECRET_KEY}
      - MAX_UPLOAD_MB=5
      - CORS_ORIGINS=http://${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: go_worker
    restart: unless-stopped
    command: celery -A worker.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - S3_BUCKET=${S3_BUCKET}
      - S3_PUBLIC_ENDPOINT=http://${DOMAIN}:9002
      - PUBLIC_ASSETS_BASE_URL=http://${DOMAIN}/assets
      - NEXT_PUBLIC_API_BASE_URL=http://${DOMAIN}/api
      - SECRET_KEY=${SECRET_KEY}
      - LLM_API_KEY=${LLM_API_KEY}
      - TTS_API_KEY=${TTS_API_KEY}
      - KATAGO_BINARY=/opt/katago/katago
      - KATAGO_NETWORK=/opt/katago/models/network.bin.gz
      - KATAGO_CONFIG=/opt/katago/config.cfg
      - ANALYSIS_VISITS_PASS1=300
      - ANALYSIS_VISITS_PASS2=1600
      - BOARD_SIZE_DEFAULT=9
      - LESSON_SCENES_MIN=4
      - LESSON_SCENES_MAX=6
      - OPENAI_API_KEY=${LLM_API_KEY}
      - OPENAI_ORG_ID=${OPENAI_ORG_ID}
      - OPENAI_PROJECT_ID=${OPENAI_PROJECT_ID}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./docker/katago:/opt/katago/models

  redis:
    image: redis:7-alpine
    container_name: go_redis
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: go_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: go_minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: [ "server", "/data", "--console-address", ":9001" ]
    volumes:
      - minio_data:/data
    ports:
      - "9002:9000"
      - "9003:9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  minio_init:
    image: minio/mc:latest
    container_name: go_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} && mc mb -p local/${S3_BUCKET} || true && mc anonymous set download local/${S3_BUCKET} || true "
    restart: "no"

volumes:
  caddy_data:
  caddy_config:
  redis_data:
  pg_data:
  minio_data:
