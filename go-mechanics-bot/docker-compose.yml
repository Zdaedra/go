version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASS}
      POSTGRES_DB: ${PG_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  orchestrator:
    build: ./services/orchestrator
    environment:
      PG_DSN: ${PG_DSN}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET_ARTIFACTS: ${S3_BUCKET_ARTIFACTS}
      S3_BUCKET_REPORTS: ${S3_BUCKET_REPORTS}
      S3_ACCESS_KEY: ${ORCH_S3_ACCESS_KEY}
      S3_SECRET_KEY: ${ORCH_S3_SECRET_KEY}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - minio

  collector:
    build: ./services/collector
    environment:
      ORCH_URL: ${ORCH_URL}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET_ARTIFACTS: ${S3_BUCKET_ARTIFACTS}
      S3_ACCESS_KEY: ${COLLECTOR_S3_ACCESS_KEY}
      S3_SECRET_KEY: ${COLLECTOR_S3_SECRET_KEY}

      OGS_USERNAME: ${OGS_USERNAME}
      OGS_PASSWORD: ${OGS_PASSWORD}
    shm_size: "2gb"
    depends_on:
      - redis
      - minio
      - orchestrator

  analyzer:
    build: ./services/analyzer
    environment:
      ORCH_URL: ${ORCH_URL}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET_ARTIFACTS: ${S3_BUCKET_ARTIFACTS}
      S3_BUCKET_REPORTS: ${S3_BUCKET_REPORTS}
      S3_ACCESS_KEY: ${ANALYZER_S3_ACCESS_KEY}
      S3_SECRET_KEY: ${ANALYZER_S3_SECRET_KEY}

      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
    depends_on:
      - redis
      - minio
      - orchestrator

  implementer:
    build: ./services/implementer
    environment:
      ORCH_URL: ${ORCH_URL}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET_REPORTS: ${S3_BUCKET_REPORTS}
      S3_ACCESS_KEY: ${IMPL_S3_ACCESS_KEY}
      S3_SECRET_KEY: ${IMPL_S3_SECRET_KEY}

      TARGET_REPO_URL: ${TARGET_REPO_URL}
      GIT_TOKEN: ${GIT_TOKEN}
      GIT_PROVIDER: ${GIT_PROVIDER}
      TARGET_BASE_BRANCH: ${TARGET_BASE_BRANCH}
    depends_on:
      - redis
      - minio
      - orchestrator

volumes:
  pgdata:
  miniodata:
