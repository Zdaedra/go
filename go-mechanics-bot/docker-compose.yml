version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASS:-postgres}
      POSTGRES_DB: ${PG_DB:-gomech}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres || pg_isready -U ${PG_USER:-postgres}" ]
      interval: 5s

  redis:
    image: redis:7
    ports:
      - "6380:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9004:9000"
      - "9005:9001"
    volumes:
      - miniodata:/data

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    environment:
      PG_DSN: ${PG_DSN:-postgresql://postgres:postgres@postgres:5432/gomech}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET_ARTIFACTS: ${S3_BUCKET_ARTIFACTS}
      S3_BUCKET_REPORTS: ${S3_BUCKET_REPORTS}
      S3_ACCESS_KEY: ${ORCH_S3_ACCESS_KEY}
      S3_SECRET_KEY: ${ORCH_S3_SECRET_KEY}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - minio

